# Camera configuration for the fixed overhead camera path.
# Wrist calibration data may live beside this file for future use, but board
# detection must only use the overhead calibration profile.

overhead:
  camera_index: 0
  device_path: /dev/v4l/by-id/usb-DHZJ-240229-XH_Integrated_Webcam_HD-video-index0
  calibration_path: data/calibration/cameras/overhead_calibration.npz
  width: 1280
  height: 720
  v4l2_controls:
    brightness: 0
    contrast: 3
    saturation: 69
    hue: 0
    gamma: 84
    gain: 1
    power_line_frequency: 1
    sharpness: 2
    white_balance_temperature_auto: 1
    exposure_auto: 3
    backlight_compensation: 32

wrist:
  camera_index: 1
  device_path: /dev/v4l/by-id/usb-CN02KX4NLG0004ABK00_USB_Camera_CN02KX4NLG0004ABK00-video-index0
  calibration_path: null
  enabled: false
  board_detection: false
  note: "Current wrist camera is not the previously calibrated wrist camera."
