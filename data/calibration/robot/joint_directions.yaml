directions:
  shoulder_pan:
    sign: 1
    positive_description: "increasing ticks rotates the arm clockwise when viewed from above"
    notes: "shoulder pan/base yaw joint"
  shoulder_lift:
    sign: 1
    positive_description: "increasing ticks raises the upper arm"
    notes: "shoulder lift joint"
  elbow_flex:
    sign: 1
    positive_description: "increasing ticks bends the elbow inward"
    notes: "Neutral is passive safe resting position; equals upper safe limit due to gravity/rest configuration."
  wrist_flex:
    sign: 1
    positive_description: "increasing ticks lowers the gripper tip when viewed from the side"
    notes: "wrist pitch joint"
  wrist_roll:
    sign: 1
    positive_description: "increasing ticks rotates wrist clockwise when viewed from the gripper end"
    notes: "rotates the gripper"
  gripper:
    sign: -1
    positive_description: "decreasing ticks closes the moving jaw against the fixed jaw"
    notes: "asymmetric gripper; one jaw moves, one jaw is fixed"
